<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Raporty HTML</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #111827;
            --muted: #4b5563;
            --accent: #0f766e;
            --border: #d1d5db;
        }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, #eef8f5 0%, var(--bg) 55%, #ffffff 100%);
            color: var(--text);
        }
        main {
            max-width: 980px;
            margin: 0 auto;
            padding: 28px 16px 48px;
        }
        h1 {
            margin: 0 0 8px;
        }
        .lead {
            margin: 0 0 22px;
            color: var(--muted);
            line-height: 1.45;
        }
        .cards {
            display: grid;
            gap: 14px;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
        }
        .card h2 {
            margin: 0 0 8px;
            font-size: 1.05rem;
        }
        .card p {
            margin: 0 0 10px;
            color: var(--muted);
            min-height: 2.8em;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 8px;
            text-decoration: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-weight: 600;
        }
        .btn-secondary {
            border-color: var(--border);
            color: var(--text);
        }
    </style>
</head>
<body>
<main>
    <h1>Raporty HTML</h1>
    <p class="lead">Wersje raportow do przegladania z presetami parametrow i tabela wynikow.</p>
    <div class="cards">
        {% for report in reports %}
            <article class="card">
                <h2>{{ report.title }}</h2>
                <p>{{ report.description }}</p>
                <div class="actions">
                    <a class="btn" href="{{ report.html_url }}">Otworz HTML</a>
                    <a class="btn btn-secondary" href="{{ report.json_url }}">JSON API</a>
                </div>
            </article>
        {% endfor %}
    </div>
</main>
</body>
</html>
